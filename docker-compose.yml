version: "3.9"

name: atelier-erp

services:
  postgres:
    image: postgres:16-alpine
    container_name: atelier-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atelier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atelier_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-atelier_erp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - atelier_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atelier}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: atelier-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - atelier_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: atelier-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-atelier}:${POSTGRES_PASSWORD:-atelier_dev_password}@postgres:5432/${POSTGRES_DB:-atelier_erp}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./database:/app/database
      - ./packages:/app/packages
      - /app/apps/api/node_modules

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: atelier-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/node_modules
      - /app/apps/web/.next

volumes:
  atelier_postgres_data:
  atelier_redis_data:
